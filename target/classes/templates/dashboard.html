<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>dashboard</title>

<style>

body {
    font-family: Arial, sans-serif;
    background-color: #e6f2ff;
    margin: 30px;
}

h1 {
    color: darkblue;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
    background-color: white;
}

th {
    background-color: #007bff;
    color: white;
    padding: 12px;
    border: 1px solid black;
}

td {
    padding: 10px;
    border: 1px solid gray;
    text-align: center;
    font-weight: bold;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

.add-btn {
    background-color: green;
    color: white;
    padding: 10px 18px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.edit-btn {
    background-color: orange;
    color: white;
    padding: 5px 10px;
    text-decoration: none;
    border-radius: 5px;
}

.delete-btn {
    background-color: red;
    color: white;
    padding: 5px 10px;
    text-decoration: none;
    border-radius: 5px;
}

</style>

</head>

<body>

<h1>Guest List</h1>

<a th:href="@{/guest/add}" class="add-btn">Add Guest</a>
<br><br>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>City</th>
<th>Room</th>
<th>Check In</th>
<th>Check Out</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr th:each="g : ${guestsList}">

<td th:text="${g.id}"></td>
<td th:text="${g.name}"></td>
<td th:text="${g.mobile}"></td>
<td th:text="${g.city}"></td>
<td th:text="${g.roomNumber}"></td>
<td th:text="${g.checkInDate}"></td>
<td th:text="${g.checkOutDate}"></td>
<td th:text="${g.totalAmount}"></td>
<td th:text="${g.paymentStatus}"></td>

<td>

<a th:href="@{'/guest/edit/' + ${g.id}}" class="edit-btn">Edit</a>

<a th:href="@{'/guest/delete/' + ${g.id}}" class="delete-btn">Delete</a>


</td>

</tr>

</table>

</body>
</html>
